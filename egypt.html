<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2;url=https://www.viator.com/searchResults/all?destination=Egypt&mcid=28353">
    <title>Pyramids & Nile Adventure - Experience Steals</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
        }
        .emoji { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .price { font-size: 2.5rem; font-weight: 800; margin: 1rem 0; }
        .was { text-decoration: line-through; opacity: 0.7; font-size: 1.5rem; }
        p { font-size: 1.1rem; opacity: 0.9; max-width: 400px; }
        .loader {
            margin-top: 2rem;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="emoji">🏛️</div>
    <h1>Pyramids & Nile Adventure</h1>
    <p>Egypt, Egypt</p>
    <div>
        <span class="was">$2400</span>
        <div class="price">$1299</div>
    </div>
    <p>6 experiences included</p>
    <p>Taking you to Viator...</p>
    <div class="loader"></div>
</body>
</html>
